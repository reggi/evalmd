name: 'Tests: node.js < 10'

on: [pull_request, push]

permissions:
  contents: read

jobs:
  tests:
    uses: ljharb/actions/.github/workflows/node.yml@main
    with:
      range: '>= 4.2 < 10'
      type: majors
      # npm 2/3 does not understand `peerDependenciesMeta`, so eslint's optional `jiti` peer trips the `npm ls` check
      skip-ls-check: true
      build-command: npm run build
      build-output-dir: |
        dist
        dist-test
      command: npm run tests-only --ignore-scripts

  node:
    name: 'node < 10'
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - run: true
