name: 'Tests: node.js < 10'

on: [pull_request, push]

permissions:
  contents: read

jobs:
  tests:
    uses: ljharb/actions/.github/workflows/node.yml@main
    with:
      range: '>= 4.2 < 10'
      type: majors
      # `typescript@next` (7.x) is outside `@typescript-eslint`'s `<6.1.0` peer range, which the old npm
      # on node < 10 fails its `npm ls` check on; neither is used here (both need far newer node)
      skip-ls-check: true
      build-command: npm run build
      build-output-dir: |
        dist
        dist-test
      command: npm run tests-only --ignore-scripts

  node:
    name: 'node < 10'
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - run: true
